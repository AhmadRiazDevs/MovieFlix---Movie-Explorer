<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='56' font-size='60' text-anchor='middle' dominant-baseline='middle'>🎬</text></svg>">
    <title>MovieFlix - Movie Explorer</title>

</head>
<body>
    <div class="header">
        <div class="logo">MovieFlix</div>

        <div class="search-container">
            <div class="search-input-wrapper">
                <input type="text"  class="search-input" 
                placeholder="Search for movies..." id="searchInput">
                <div id="searchHistoryDropdown" class="search-history-dropdown"></div>
            </div>
        </div>
        <div class="filters">
            <select id="genreFilter">
                <option value="">All Genres</option>
            </select>

            <select id="yearFilter">
                <option value="">All Years</option>
            </select>

            <select id="sortFilter">
                <option value="">Sort by Rating</option>
                <option value="popularity.desc"> Most Popular</option>
                <option value="vote_average.desc">Highest Rated</option>
                <option value="release_date.desc">Latest Release</option> 
                <option value ="title.asc">A-Z</option>   
            </select>
        </div>
        <button class="clear-btn" id="clearBtn">Clear All</button>
    </div>

    <div class="main-content">
        <div id="trendingSection">
            <div class="section-title">
                🔥 Trending Movies
            </div>
            <div class="carousel-container">
                <button class="carousel-btn prev" id="trendingPrevBtn">
                    <
                </button>
                <div class="carousel" id="trendingCarousel">
                    <div class="loading">
                        Loading trending movies...
                    </div>
                </div>
                <button class="carousel-btn next" id="trendingNextBtn">
                    > 
                </button>
            </div>
        </div>

        <div class="section-title" id="randomSectionTitle">
            🎬 Discover Movies
        </div>
        <div class="movie-grid" id="movieGrid">
            <div class="loading">Loading movies...</div>
        </div>
    </div>

    <div class="movie-modal" id="movieModal">
        <div class="movie-modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Movie Title</h2>
                <button class="modal-close" id="modalCloseBtn">×</button>
            </div>
            <div class="modal-body">
                <img id="modalPoster" class="modal-poster" src="" alt="Movie poster">
                <div class="modal-details">
                    <div class="modal-meta" id="modalMeta"></div>
                    <p class="modal-overview" id="modalOverview"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body> 
</html>
